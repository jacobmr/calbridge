<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — MiCal</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, var(--cloud) 0%, var(--white) 100%);
      padding: 24px;
    }
    .login-card {
      background: var(--white);
      border-radius: 16px;
      padding: 48px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      text-align: center;
    }
    .login-card .logo {
      font-size: 1.8rem;
      margin-bottom: 8px;
      display: inline-block;
    }
    .login-card h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--charcoal);
    }
    .login-card p {
      color: var(--stone);
      margin-bottom: 32px;
    }
    .provider-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 14px 20px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      margin-bottom: 12px;
      transition: all 0.2s;
      border: 1.5px solid transparent;
    }
    .provider-btn:hover {
      transform: translateY(-1px);
    }
    .google-btn {
      background: var(--white);
      color: var(--charcoal);
      border-color: rgba(0,0,0,0.1);
    }
    .google-btn:hover {
      background: #f8f9fa;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .microsoft-btn {
      background: var(--bridge-blue);
      color: var(--white);
    }
    .microsoft-btn:hover {
      background: var(--blue-dark);
      box-shadow: 0 4px 12px rgba(15,76,129,0.25);
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: var(--stone);
      font-size: 0.85rem;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(0,0,0,0.08);
    }
    .back-link {
      display: inline-block;
      margin-top: 24px;
      color: var(--stone);
      text-decoration: none;
      font-size: 0.9rem;
    }
    .back-link:hover {
      color: var(--charcoal);
    }
    @media (max-width: 480px) {
      .login-card {
        padding: 32px 24px;
      }
    }
  </style>
  <script>
    fetch('/api/auth/me', { credentials: 'same-origin' })
      .then(r => { if (r.ok) window.location.replace('/app/'); })
      .catch(() => {});
  </script>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <a href="/" class="logo">Mi<span>Cal</span></a>
      <h1>Welcome back</h1>
      <p>Sign in to manage your calendars and bookings.</p>

      <a href="/api/oauth/google/init" class="provider-btn google-btn">
        <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Sign in with Google
      </a>

      <div class="divider">or</div>

      <a href="/api/oauth/microsoft/init" class="provider-btn microsoft-btn">
        <svg width="20" height="20" viewBox="0 0 21 21"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg>
        Sign in with Microsoft
      </a>

      <a href="/" class="back-link">← Back to home</a>
    </div>
  </div>
</body>
</html>
