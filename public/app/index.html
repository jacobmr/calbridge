<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MiCal Dashboard</title>
    <link rel="stylesheet" href="/app/app.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌉</text></svg>"
    />
  </head>
  <body>
    <div class="app-layout">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <a href="/" class="logo"
            ><img
              src="/logo.svg"
              alt=""
              style="
                width: 28px;
                height: 28px;
                vertical-align: middle;
                margin-right: 8px;
                border-radius: 6px;
              "
            />Mi<span>Cal</span></a
          >
        </div>

        <nav class="sidebar-nav">
          <button
            class="nav-item active"
            data-tab="overview"
            onclick="showTab('overview')"
          >
            <span class="nav-icon"
              ><svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path
                  d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1h-5v-7h-6v7H4a1 1 0 0 1-1-1V9.5z"
                /></svg
            ></span>
            Overview
          </button>
          <button
            class="nav-item"
            data-tab="calendars"
            onclick="showTab('calendars')"
          >
            <span class="nav-icon"
              ><svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <rect x="3" y="4.5" width="18" height="16" rx="2" />
                <path d="M3 9h18M8 2.5v4M16 2.5v4" /></svg
            ></span>
            Calendars
          </button>
          <button
            class="nav-item"
            data-tab="sync-flows"
            onclick="showTab('sync-flows')"
          >
            <span class="nav-icon"
              ><svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path d="M21 12a9 9 0 0 0-15.7-6" />
                <path d="M3 4v5h5" />
                <path d="M3 12a9 9 0 0 0 15.7 6" />
                <path d="M21 20v-5h-5" /></svg
            ></span>
            Sync Flows
          </button>
          <button
            class="nav-item"
            data-tab="event-types"
            onclick="showTab('event-types')"
          >
            <span class="nav-icon"
              ><svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path d="M8 6h13M8 12h13M8 18h13" />
                <circle cx="3.5" cy="6" r="1" />
                <circle cx="3.5" cy="12" r="1" />
                <circle cx="3.5" cy="18" r="1" /></svg
            ></span>
            Event Types
          </button>
          <button
            class="nav-item"
            data-tab="bookings"
            onclick="showTab('bookings')"
          >
            <span class="nav-icon"
              ><svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path
                  d="M4 4.5v15a1.5 1.5 0 0 0 1.5 1.5H20V3H6.5A2.5 2.5 0 0 0 4 5.5v0z"
                />
                <path d="M8 7h9" /></svg
            ></span>
            Bookings
          </button>
        </nav>

        <div class="sidebar-footer">
          <div class="user-info">
            <div class="user-avatar" id="user-avatar">?</div>
            <div class="user-details">
              <div class="user-name" id="user-name">Loading…</div>
              <div class="user-email" id="user-email"></div>
            </div>
          </div>
          <button
            class="btn btn-secondary btn-sm btn-block"
            onclick="handleLogout()"
          >
            Logout
          </button>
        </div>
      </aside>

      <!-- Mobile overlay -->
      <div
        class="sidebar-overlay"
        id="sidebar-overlay"
        onclick="toggleSidebar()"
      ></div>

      <!-- Main Content -->
      <main class="main-content">
        <header class="top-bar">
          <button
            class="mobile-menu-btn"
            onclick="toggleSidebar()"
            aria-label="Open menu"
          >
            <svg
              width="22"
              height="22"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <line x1="3" y1="6" x2="21" y2="6" />
              <line x1="3" y1="12" x2="21" y2="12" />
              <line x1="3" y1="18" x2="21" y2="18" />
            </svg>
          </button>
          <h1 id="page-title">Dashboard</h1>
          <!-- Group switcher mounts here when the user has ≥1 group. Hidden
               by default; populated by renderGroupSwitcher() after groups load. -->
          <div id="group-switcher" class="group-switcher" hidden></div>
        </header>

        <div class="page-content">
          <!-- Overview -->
          <div class="tab-page" id="tab-overview" style="display: block">
            <div id="overview-content">
              <div class="loading">
                <div class="spinner"></div>
                Loading…
              </div>
            </div>
          </div>

          <!-- Calendars -->
          <div class="tab-page" id="tab-calendars" style="display: none">
            <div id="calendars-content">
              <div class="loading">
                <div class="spinner"></div>
                Loading calendars…
              </div>
            </div>
          </div>

          <!-- Sync Flows -->
          <div class="tab-page" id="tab-sync-flows" style="display: none">
            <div id="sync-flows-content">
              <div class="loading">
                <div class="spinner"></div>
                Loading sync flows…
              </div>
            </div>
          </div>

          <!-- Event Types -->
          <div class="tab-page" id="tab-event-types" style="display: none">
            <div id="event-types-content">
              <div class="loading">
                <div class="spinner"></div>
                Loading event types…
              </div>
            </div>
          </div>

          <!-- Bookings -->
          <div class="tab-page" id="tab-bookings" style="display: none">
            <div id="bookings-content">
              <div class="loading">
                <div class="spinner"></div>
                Loading bookings…
              </div>
            </div>
          </div>

          <!-- Group settings (only reachable when a group is selected) -->
          <div class="tab-page" id="tab-group-settings" style="display: none">
            <div id="group-settings-content">
              <div class="loading">
                <div class="spinner"></div>
                Loading group…
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Calendar Preview Modal -->
    <div
      class="modal-overlay"
      id="preview-modal"
      onclick="if (event.target === this) closePreviewModal();"
    >
      <div class="modal-dialog">
        <div class="modal-header">
          <h3>Discover Calendars</h3>
          <button class="modal-close" onclick="closePreviewModal()">×</button>
        </div>
        <div class="modal-body" id="preview-modal-body">
          <div class="loading">
            <div class="spinner"></div>
            Loading…
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closePreviewModal()">
            Cancel
          </button>
          <button
            class="btn btn-primary"
            id="preview-import-btn"
            onclick="importSelectedCalendars()"
          >
            Import Selected
          </button>
        </div>
      </div>
    </div>

    <script src="/app/app.js"></script>
  </body>
</html>
